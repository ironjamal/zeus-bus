<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedules | Zeus Bus</title>
   <!-- Google Font: Outfit -->

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">

 <link rel="icon" type="image/png" href="logo.png">
  <style>
    :root {
      --red: #E31E24;
      --black: #0F0F0F;
      --white: #FFFFFF;
      --bg-body: #F8FAFC;
      --text-muted: #64748B;
      --dark-red: #B3191E;
      --brand-red: #E31E24;
      --deep-red: #B3191E;
      --pure-white: #FFFFFF;
      --off-white: #FBFBFF;
      --dark-obsidian: #0A0A0A;
      --text-muted: #94A3B8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: var(--off-white);
      color: var(--dark-obsidian);
      -webkit-font-smoothing: antialiased;
    }

    /* --- Navbar: Elegant & Minimal --- */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 25px 8%;
      background: var(--dark-red);
      border-bottom: 1px solid #F1F5F9;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--white);
      text-decoration: none;
      letter-spacing: 2px;
    }

    .nav-link {
      text-decoration: none;
      color: var(--white);
      font-weight: 700;
      font-size: .9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* --- Hero: Minimalist White --- */
    .hero {
      padding: 80px 6% 120px;
      text-align: center;
      background: var(--pure-white);
    }

    .hero span {
      display: inline-block;
      color: var(--dark-red);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 4px;
      font-size: 0.8rem;
      margin-bottom: 15px;
    }

    .hero h1 {
      font-size: 3.5rem;
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
    }

    /* --- Container --- */
    .container {
      max-width: 600px;
      margin: -70px auto 80px;
      padding: 0 20px;
    }

    /* --- Pro Red Cards --- */
    .card {
      background: var(--dark-red);
      border-radius: 32px;
      padding: 40px;
      margin-bottom: 25px;
      color: var(--pure-white);
      box-shadow: 0 25px 50px -12px rgba(227, 30, 36, 0.25);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .card:hover {
      transform: translateY(-8px);
    }

    .card-header {
      margin-bottom: 30px;
      border-left: 4px solid var(--pure-white);
      padding-left: 15px;
    }

    .card-header h2 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    /* Route Tags */
    .route-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .route-tag {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 15px;
      border-radius: 20px;
      text-align: center;
      font-weight: 700;
      backdrop-filter: blur(5px);
    }

    /* Schedule Styling */
    .time-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    .time-row:last-child { border-bottom: none; }

    .time-block .tag {
      font-size: 0.7rem;
      text-transform: uppercase;
      font-weight: 700;
      opacity: 0.8;
      display: block;
      margin-bottom: 4px;
    }

    .time-block .hour {
      font-size: 1.4rem;
      font-weight: 900;
    }

    .separator {
      height: 2px;
      width: 30px;
      background: var(--pure-white);
      opacity: 0.5;
    }

    /* Exam Alert */
    .exam-card {
      background: var(--dark-obsidian);
      border-radius: 28px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    .exam-card h4 {
      color: var(--brand-red);
      font-weight: 900;
      font-size: 1.1rem;
      margin-bottom: 5px;
    }

    .exam-card p {
      color: var(--pure-white);
      font-weight: 500;
      opacity: 0.9;
    }

    /* The Main CTA */
    .cta-button {
      display: block;
      background: var(--dark-red);
      color: var(--pure-white);
      text-align: center;
      padding: 25px;
      border-radius: 24px;
      text-decoration: none;
      font-weight: 900;
      font-size: 1.2rem;
      margin-top: 40px;
      box-shadow: 0 20px 40px rgba(227, 30, 36, 0.3);
      transition: 0.3s;
    }

    .cta-button:hover {
      background: var(--dark-obsidian);
      transform: scale(1.02);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    }

    footer {
      text-align: center;
      padding: 60px 0;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    @media (max-width: 500px) {
      .hero h1 { font-size: 2.8rem; }
      .card { padding: 30px 20px; }
      .time-block .hour { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="https://ironjamal.github.io/zeus-bus/" class="logo">ZEUS BUS</a>
    <a href="https://ironjamal.github.io/zeus-bus/" class="nav-link">Home</a>
  </nav>

  <div class="hero">
    <span>Ready to go?</span>
    <h1>Where we go!</h1>
  </div>

  <div class="container">
    
    <!-- Routes -->
    <div class="card">
      <div class="card-header">
        <h2>Active Lines</h2>
      </div>
      <div class="route-grid">
        <div class="route-tag">Alb7r</div>
        <div class="route-tag">Alazhar</div>
        <div class="route-tag">Elmo3lmeen</div>
      </div>
    </div>

    <!-- Times -->
    <div class="card">
      <div class="card-header">
        <h2>Bus Timings</h2>
      </div>

      <div class="time-row">
        <div class="time-block">
          <span class="tag">Starts</span>
          <span class="hour">08:00 AM</span>
        </div>
        <div class="separator"></div>
        <div class="time-block" style="text-align: right;">
          <span class="tag">Arrives</span>
          <span class="hour">09:00 AM</span>
        </div>
      </div>

      <div class="time-row">
        <div class="time-block">
          <span class="tag">Starts</span>
          <span class="hour">10:00 AM</span>
        </div>
        <div class="separator"></div>
        <div class="time-block" style="text-align: right;">
          <span class="tag">Arrives</span>
          <span class="hour">11:00 AM</span>
        </div>
      </div>

      <div class="time-row">
        <div class="time-block">
          <span class="tag">Starts</span>
          <span class="hour">12:00 PM</span>
        </div>
        <div class="separator"></div>
        <div class="time-block" style="text-align: right;">
          <span class="tag">Arrives</span>
          <span class="hour">01:00 PM</span>
        </div>
      </div>
    </div>

    <!-- Special Exam Note -->
    <div class="exam-card">
      <h4>Final & midterm</h4>
      <p>Flexible Departure Times During Exams</p>
    </div>

    <!-- Main Action -->
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSeB-g0PqexsdDbRheIVA4l95dSTmZdJZY3OPIa6RiLrSdocnQ/viewform?usp=header" class="cta-button">
      Book Your Seat
    </a>

    <footer>
      ZEUS BUS &bull; ASSIUT 2026
    </footer>
  </div>

</body>
</html>
